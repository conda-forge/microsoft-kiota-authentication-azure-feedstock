context:
  name: microsoft-kiota-authentication-azure
  version: "1.11.7"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/microsoft_kiota_authentication_azure-${{ version }}.tar.gz
  sha256: 1052ea952955475a164ba4486085e0de9fcaa978c7c0b73202bc6a9eabd9b412

build:
  noarch: python
  script: python -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - flit-core >=3.2,<4
  run:
    - python >=${{ python_min }},<4.0
    - aiohttp >=3.8.0
    - azure-core >=1.21.1
    - microsoft-kiota-abstractions >=1.11.1,<2.0.0
    - opentelemetry-api >=1.27.0
    - opentelemetry-sdk >=1.27.0

tests:
  - python:
      imports:
        - kiota_authentication_azure
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  homepage: https://github.com/microsoft/kiota-python/tree/main/packages/authentication/azure
  summary: Authentication provider for Kiota using Azure Identity
  license: MIT
  license_file: LICENSE
  documentation: https://github.com/microsoft/kiota-python/blob/main/packages/authentication/azure/README.md
  repository: https://github.com/microsoft/kiota-python/tree/main/packages/authentication/azure

extra:
  recipe-maintainers:
    - xylar
